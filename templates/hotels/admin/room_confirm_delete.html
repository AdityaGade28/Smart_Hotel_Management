{% extends 'base.html' %}
{% block title %}Delete Room — Admin{% endblock %}
{% block content %}
<div class="container" style="max-width:500px;">
    <div class="card shadow-sm text-center p-4">
        <i class="bi bi-exclamation-triangle text-danger" style="font-size:3rem;"></i>
        <h4 class="fw-bold mt-3">Delete Room?</h4>
        <p class="text-muted">Delete Room <strong>{{ room.room_number }}</strong> from <strong>{{ room.hotel.name }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-2 justify-content-center">
                <button type="submit" class="btn btn-danger">Yes, Delete</button>
                <a href="{% url 'hotels:admin_room_list' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
