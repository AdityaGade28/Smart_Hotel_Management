{% extends 'base.html' %}
{% block title %}Cancel Booking{% endblock %}
{% block content %}
<div class="container" style="max-width:480px;">
    <div class="card shadow-sm text-center p-4">
        <i class="bi bi-exclamation-triangle text-warning" style="font-size:3rem;"></i>
        <h4 class="fw-bold mt-3">Cancel Booking?</h4>
        <p class="text-muted">Booking <strong>{{ booking.short_booking_id }}</strong> at <strong>{{ booking.room.hotel.name }}</strong> for ₹{{ booking.total_price }}.</p>
        <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-2 justify-content-center">
                <button type="submit" class="btn btn-danger">Yes, Cancel</button>
                <a href="{% url 'bookings:booking_detail' pk=booking.pk %}" class="btn btn-outline-secondary">Keep Booking</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
