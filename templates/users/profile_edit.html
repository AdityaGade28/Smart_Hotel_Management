{% extends 'base.html' %}
{% block title %}Edit Profile — SmartHotel{% endblock %}
{% block content %}
<div class="container" style="max-width:600px;">
    <div class="d-flex align-items-center mb-4">
        <a href="{% url 'users:profile' %}" class="btn btn-outline-secondary btn-sm me-3"><i class="bi bi-arrow-left"></i></a>
        <h1 class="h4 fw-bold mb-0">Edit Profile</h1>
    </div>
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label for="{{ field.id_for_label }}" class="form-label fw-semibold small">{{ field.label }}</label>
                    {{ field }}
                    {% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="{% url 'users:profile' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
