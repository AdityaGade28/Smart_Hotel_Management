{% extends 'base.html' %}
{% block title %}Request Service{% endblock %}
{% block content %}
<div class="container" style="max-width:500px;">
    <h1 class="h4 fw-bold mb-4">Request a Service</h1>
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold small">Service Type</label>
                    <select name="service_type" class="form-select" required>
                        <option value="">-- Select Service --</option>
                        {% for val, label in service_choices %}
                        <option value="{{ val }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold small">Notes (Optional)</label>
                    <textarea name="notes" class="form-control" rows="3" placeholder="Any specific requirements..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100">Submit Request</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
