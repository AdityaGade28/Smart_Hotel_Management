{% load static %}
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Smart Hotel</title>
<style>
body{margin:0;font-family:Poppins;background:#020617;color:white;padding:20px}
nav{position:sticky;top:0;z-index:999;background:rgba(0,0,0,0.65);
backdrop-filter:blur(10px);padding:15px 30px;display:flex;justify-content:space-between;align-items:center;}
nav h2{margin:0;color:#38bdf8;font-size:26px}
nav a{color:white;margin:0 12px;text-decoration:none;font-weight:500}
nav a:hover{color:#38bdf8}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px;margin-top:30px}
.box{padding:25px;border-radius:18px;text-align:center;background:#2563eb;transition:.3s}
.box a{color:white;text-decoration:none;font-weight:600}
.box:hover{transform:scale(1.05)}
</style>
</head>
<body>

<nav>
<h2>Smart Hotel Admin</h2>
<div>
<a href="{% url 'home' %}">Home</a>
<a href="{% url 'dashboard' %}">Dashboard</a>
<a href="{% url 'bookings' %}">Bookings</a>
<a href="{% url 'payments' %}">Payments</a>
<a href="{% url 'staff' %}">Staff</a>
<a href="{% url 'logout' %}">Logout</a>
</div>
</nav>

<h2>Admin Dashboard</h2>
<div class="grid">
<div class="box"><a href="{% url 'bookings' %}">Bookings</a></div>
<div class="box"><a href="{% url 'payments' %}">Payments</a></div>
<div class="box"><a href="{% url 'staff' %}">Staff</a></div>
</div>

</body>
</html>
