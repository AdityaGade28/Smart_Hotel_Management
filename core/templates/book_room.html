{% load static %}
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Room - Smart Hotel</title>

<style>
/* General */
body {
  margin: 0;
  font-family: Poppins, Arial;
  background: #f8fafc;
  color: #020617;
  padding: 20px;
}
.container{
  max-width: 900px;
  margin: auto;
}

/* Navbar */
nav {
  position: sticky;
  top: 0;
  z-index: 999;
  background: #ffffff;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  border-radius: 10px;
  flex-wrap: wrap;
}
nav h2 {
  margin: 0;
  color: #2563eb;
  font-size: 26px;
}
nav div a {
  color: #020617;
  margin: 0 8px;
  text-decoration: none;
  font-weight: 500;
  padding: 8px 14px;
  border-radius: 8px;
  transition: 0.3s;
}
nav div a:hover {
  background: #2563eb;
  color: white;
}

/* Form */
form {
  margin-top: 30px;
  background: #ffffff;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.1);
  position: relative;
}
h2,h3 {
  color: #2563eb;
  margin-bottom: 15px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
  gap: 15px;
  margin-bottom: 20px;
}
input, select {
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #d1d5db;
  width: 100%;
  font-size: 16px;
}
button {
  margin-top: 20px;
  width: 100%;
  padding: 15px;
  background: #22c55e;
  border: none;
  border-radius: 12px;
  color: white;
  font-weight: 600;
  font-size: 18px;
  cursor: pointer;
  transition: 0.3s;
}
button:hover {
  background: #16a34a;
}

/* Toast Notification */
.toast {
  position: fixed;
  top: 20px;
  right: 20px;
  background: #22c55e;
  color: white;
  padding: 14px 24px;
  border-radius: 12px;
  box-shadow:0 5px 15px rgba(0,0,0,.2);
  display: none;
  z-index: 1000;
  font-weight: 500;
}
.toast.error { background: #ef4444; }

/* Responsive */
@media(max-width:500px){
  .grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<div class="container">

<!-- Navbar -->
<nav>
  <h2>Smart Hotel</h2>
  <div>
    <a href="{% url 'home' %}">Home</a>
    <a href="{% url 'facilities' %}">Facilities</a>
    <a href="{% url 'contact' %}">Contact</a>
    <a href="{% url 'book_room' %}">Book</a>
    <a href="{% url 'profile' %}">Profile</a>
  </div>
</nav>

<!-- Toast Notification -->
<div id="toast" class="toast"></div>

<!-- Booking Form -->
<form method="post" action="{% url 'book_room' %}">
  {% csrf_token %}
  <h2>Book Your Room</h2>

  <h3>User Details</h3>
  <div class="grid">
    <input type="text" name="name" placeholder="Full Name" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="text" name="mobile" placeholder="Mobile Number" required>
    <select name="country" required>
      <option value="">Select Country</option>
      <option>India</option>
      <option>USA</option>
      <option>UK</option>
      <option>Other</option>
    </select>
  </div>

  <h3>Reservation Details</h3>
  <div class="grid">
    <select name="room_type" required>
      <option value="">Room Type</option>
      <option>Single</option>
      <option>Double</option>
      <option>Deluxe</option>
      <option>Suite</option>
    </select>

    <select name="bedding_type" required>
      <option value="">Bedding Type</option>
      <option>Single Bed</option>
      <option>Double Bed</option>
    </select>

    <input type="number" name="num_rooms" placeholder="Number of Rooms" min="1" required>

    <select name="meal_plan" required>
      <option value="">Meal Plan</option>
      <option>Breakfast</option>
      <option>All Meals</option>
    </select>

    <input type="date" name="check_in" required>
    <input type="date" name="check_out" required>
  </div>

  <button type="submit">Book Now</button>
</form>

</div>

<script>
// Show toast notification
function showToast(message, isError=false){
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = 'toast';
  if(isError) toast.classList.add('error');
  toast.style.display = 'block';
  setTimeout(()=>{ toast.style.display='none'; }, 4000);
}

// Django messages
{% if messages %}
  {% for message in messages %}
    showToast("{{ message|escapejs }}", {% if 'error' in message.tags %}true{% else %}false{% endif %});
  {% endfor %}
{% endif %}
</script>

</body>
</html>
