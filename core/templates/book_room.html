{% load static %}
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Room - Smart Hotel</title>
<style>
body{margin:0;font-family:Poppins;background:#020617;color:white;padding:20px}
nav{
  position:sticky;top:0;z-index:999;background:rgba(0,0,0,0.65);
  backdrop-filter:blur(10px);padding:15px 30px;display:flex;justify-content:space-between;align-items:center;
}
nav h2{margin:0;color:#38bdf8;font-size:26px}
nav a{color:white;margin:0 12px;text-decoration:none;font-weight:500}
nav a:hover{color:#38bdf8}
form{max-width:800px;margin:auto;background:rgba(255,255,255,.08);padding:30px;border-radius:20px}
h2,h3{color:#38bdf8}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px}
input,select{padding:12px;border-radius:8px;border:none}
button{margin-top:20px;width:100%;padding:15px;background:#22c55e;border:none;border-radius:12px;color:white;font-weight:600}
</style>
</head>
<body>

<nav>
<h2>Smart Hotel</h2>
<div>
<a href="{% url 'home' %}">Home</a>
<a href="{% url 'facilities' %}">Facilities</a>
<a href="{% url 'contact' %}">Contact</a>
<a href="{% url 'book_room' %}">Book</a>
<a href="{% url 'login' %}">User</a>
<a href="{% url 'admin_login' %}">Admin</a>
</div>
</nav>

<form method="post">
{% csrf_token %}
<h2>Book Your Room</h2>

<h3>User Details</h3>
<div class="grid">
<input type="text" name="name" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email" required>
<input type="text" name="mobile" placeholder="Mobile Number" required>
<select name="country">
<option value="">Select Country</option>
<option>India</option>
<option>USA</option>
<option>UK</option>
<option>Other</option>
</select>
</div>

<h3>Reservation Details</h3>
<div class="grid">
<select name="room_type">
<option value="">Room Type</option>
<option>Single</option>
<option>Double</option>
<option>Deluxe</option>
<option>Suite</option>
</select>

<select name="bedding_type">
<option value="">Bedding Type</option>
<option>Single Bed</option>
<option>Double Bed</option>
</select>

<input type="number" name="num_rooms" placeholder="Number of Rooms" min="1" required>
<select name="meal_plan">
<option value="">Meal Plan</option>
<option>Breakfast</option>
<option>All Meals</option>
</select>

<input type="date" name="check_in" required>
<input type="date" name="check_out" required>
</div>

<button type="submit">Book Now</button>
<p style="text-align:center"><a href="{% url 'home' %}">Back to Home</a></p>
</form>

</body>
</html>
