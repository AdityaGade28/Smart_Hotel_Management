{% load static %}
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff - Smart Hotel</title>
<style>
body{margin:0;font-family:Poppins;background:#020617;color:white;padding:20px}
nav{position:sticky;top:0;background:rgba(0,0,0,0.65);padding:15px 30px;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(10px);}
nav h2{margin:0;color:#38bdf8;font-size:26px}
nav a{color:white;margin:0 12px;text-decoration:none;font-weight:500}
nav a:hover{color:#38bdf8}
table{width:100%;border-collapse:collapse;background:rgba(255,255,255,.08);margin-top:20px}
th,td{padding:12px;text-align:center}
th{background:#1e293b}
</style>
</head>
<body>

<nav>
<h2>Smart Hotel Admin</h2>
<div>
<a href="{% url 'home' %}">Home</a>
<a href="{% url 'dashboard' %}">Dashboard</a>
<a href="{% url 'bookings' %}">Bookings</a>
<a href="{% url 'payments' %}">Payments</a>
<a href="{% url 'staff' %}">Staff</a>
<a href="{% url 'logout' %}">Logout</a>
</div>
</nav>

<h2>Staff Members</h2>
<table>
<tr><th>Username</th><th>Role</th></tr>
{% for s in staff_list %}
<tr>
<td>{{ s.user.username }}</td>
<td>{{ s.role }}</td>
</tr>
{% empty %}
<tr><td colspan="2">No staff added.</td></tr>
{% endfor %}
</table>

</body>
</html>
