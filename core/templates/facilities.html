{% load static %}
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facilities - Smart Hotel</title>
<style>
body{margin:0;font-family:Poppins;background:#020617;color:white}
nav{
  position:sticky;top:0;z-index:999;background:rgba(0,0,0,0.65);
  backdrop-filter:blur(10px);padding:15px 30px;display:flex;justify-content:space-between;align-items:center;
}
nav h2{margin:0;color:#38bdf8;font-size:26px}
nav a{color:white;margin:0 12px;text-decoration:none;font-weight:500}
nav a:hover{color:#38bdf8}
.section{padding:50px}
.section h2{text-align:center;color:#38bdf8;margin-bottom:30px;font-size:38px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:25px}
.card{background:rgba(255,255,255,.08);padding:30px;border-radius:20px;box-shadow:0 15px 30px rgba(0,0,0,.5);transition:.3s}
.card:hover{transform:translateY(-10px)}
</style>
</head>
<body>

<nav>
<h2>Smart Hotel</h2>
<div>
<a href="{% url 'home' %}">Home</a>
<a href="{% url 'facilities' %}">Facilities</a>
<a href="{% url 'contact' %}">Contact</a>
<a href="{% url 'book_room' %}">Book</a>
<a href="{% url 'login' %}">User</a>
<a href="{% url 'admin_login' %}">Admin</a>
</div>
</nav>

<section class="section">
<h2>Our Facilities</h2>
<div class="grid">
<div class="card">Swimming Pool</div>
<div class="card">Gym & Spa</div>
<div class="card">Restaurant</div>
<div class="card">Conference Hall</div>
<div class="card">Free High-Speed WiFi</div>
<div class="card">Airport Pickup</div>
<div class="card">Parking Facility</div>
<div class="card">Laundry Service</div>
</div>
</section>

</body>
</html>
