{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Pay - Smart Hotel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    background: #020617;
    color: white;
    font-family: Poppins, Arial;
    padding: 20px;
    text-align: center;
}
h2, h3 {
    color: #38bdf8;
    margin-bottom: 20px;
}
.card {
    background: #1e293b;
    padding: 30px 20px;
    margin: 20px auto;
    border-radius: 15px;
    width: 350px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}
.qr {
    width: 200px;
    height: 200px;
    margin: 20px auto;
    display: block;
    border-radius: 12px;
    background: white;
    padding: 10px;
}
a.button {
    display: inline-block;
    padding: 12px 25px;
    border-radius: 12px;
    background: #22c55e;
    color: white;
    text-decoration: none;
    margin-top: 20px;
    font-weight: 600;
    transition: 0.3s;
}
a.button:hover {
    background: #16a34a;
}
</style>
</head>
<body>

<h2>Payment for Booking #{{ payment.booking.id }}</h2>

<div class="card">
    <h3>Amount: ₹{{ payment.total_amount }}</h3>
    <img class="qr" src="data:image/png;base64,{{ qr_img }}" alt="QR Code">
    <p>UPI ID: <b>{{ upi_id }}</b></p>
    <p>Scan the QR code using your UPI app to complete the payment.</p>
    <a class="button" href="{% url 'profile' %}">Back to Profile</a>
</div>

</body>
</html>
