<!DOCTYPE html>
<html>
<head>
  <title>Find Hotels in Maharashtra - Smart Hotel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    /* General */
    body{
      margin:0;
      font-family:Poppins, Arial;
      background:#f8fafc;
      color:#111827;
    }
    h1{
      text-align:center;
      color:#2563eb;
      margin:25px 0 10px;
      font-size:32px;
    }
    p{
      text-align:center;
      color:#6b7280;
      margin-bottom:25px;
      font-size:16px;
    }

    /* Button */
    .btn-box{
      text-align:center;
      margin-bottom:20px;
    }
    button{
      padding:14px 40px;
      border-radius:30px;
      border:none;
      background:linear-gradient(135deg,#22c55e,#16a34a);
      color:white;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
      box-shadow:0 8px 16px rgba(0,0,0,0.2);
      transition:0.3s;
    }
    button:hover{
      transform:scale(1.05);
      box-shadow:0 12px 24px rgba(0,0,0,0.3);
    }

    /* Map container */
    #map{
      width:90%;
      max-width:1200px;
      aspect-ratio:16/9;
      margin:0 auto 40px;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 20px 40px rgba(0,0,0,0.25);
      border:1px solid #d1d5db;
    }

    /* Navbar */
    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:#ffffff;
      padding:15px 30px;
      box-shadow:0 4px 15px rgba(0,0,0,0.1);
      border-radius:10px;
      margin:20px auto;
      max-width:1200px;
    }
    nav h2{
      margin:0;
      color:#2563eb;
      font-size:26px;
    }
    nav a{
      text-decoration:none;
      color:#111827;
      font-weight:500;
      margin:0 12px;
      padding:6px 14px;
      border-radius:8px;
      transition:0.3s;
    }
    nav a:hover{
      background:#2563eb;
      color:white;
    }

    @media(max-width:600px){
      h1{font-size:26px;}
      button{width:90%;}
      nav{flex-direction:column;}
      nav a{margin:6px 0;}
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav>
  <h2>Smart Hotel</h2>
  <div>
    <a href="{% url 'home' %}">Home</a>
    <a href="{% url 'facilities' %}">Facilities</a>
    <a href="{% url 'contact' %}">Contact</a>
    <a href="{% url 'book_room' %}">Book</a>
    <a href="{% url 'profile' %}">Profile</a>
  </div>
</nav>

<h1>Find Hotels Near You</h1>
<p>Showing real hotels from OpenStreetMap (Maharashtra only, 100 km radius)</p>

<div class="btn-box">
  <button onclick="getLocation()">Find Hotels Near Me</button>
</div>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  var map = L.map('map').setView([19.7515, 75.7139], 6); // Maharashtra

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap contributors'
  }).addTo(map);

  function getLocation(){
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(showPosition, showError);
    }else{
      alert("Geolocation not supported");
    }
  }

  function showPosition(position){
    let lat = position.coords.latitude;
    let lon = position.coords.longitude;

    if(lat < 15 || lat > 22 || lon < 72 || lon > 81){
      alert("You are outside Maharashtra");
      return;
    }

    map.setView([lat, lon], 13);
    L.marker([lat, lon]).addTo(map)
      .bindPopup("<b>You are here</b>").openPopup();

    showHotels(lat, lon);
  }

  function showHotels(lat, lon){
    let radius = 100000; // 100 km

    let query = `
    [out:json];
    (
      node["tourism"="hotel"](around:${radius},${lat},${lon});
      way["tourism"="hotel"](around:${radius},${lat},${lon});
      relation["tourism"="hotel"](around:${radius},${lat},${lon});
    );
    out center;
    `;

    fetch("https://overpass-api.de/api/interpreter", {
      method: "POST",
      body: query
    })
    .then(res => res.json())
    .then(data => {
      if(data.elements.length === 0){
        alert("No hotels found in 100 km");
        return;
      }

      data.elements.forEach(place => {
        let plat = place.lat || place.center.lat;
        let plon = place.lon || place.center.lon;
        let name = place.tags.name || "Hotel";

        L.marker([plat, plon]).addTo(map)
          .bindPopup(`
            <b>${name}</b><br>
            Maharashtra<br>
            <a href="/book_room/" style="color:#2563eb;">Book Now</a>
          `);
      });
    })
    .catch(() => alert("OSM server busy, try again"));
  }

  function showError(){
    alert("Location permission denied");
  }
</script>

</body>
</html>
