{% load static %}
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - Smart Hotel</title>
<style>
body{margin:0;font-family:Poppins;background:#020617;color:white;display:flex;justify-content:center;align-items:center;height:100vh}
form{background:rgba(255,255,255,.1);padding:35px;border-radius:20px;width:350px}
input,textarea{width:100%;padding:12px;margin:10px 0;border-radius:8px;border:none}
button{width:100%;padding:12px;background:#38bdf8;border:none;border-radius:10px;color:white;font-weight:600}
a{color:#38bdf8;text-decoration:none}
</style>
</head>
<body>

<form>
<h2>Contact Us</h2>
<input type="text" placeholder="Name" required>
<input type="email" placeholder="Email" required>
<textarea placeholder="Your Message" rows="5" required></textarea>
<button>Send Message</button>
<p style="text-align:center"><a href="{% url 'home' %}">Back to Home</a></p>
</form>

</body>
</html>
