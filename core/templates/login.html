{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Login / Register - Smart Hotel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* Body & Container */
body{
  font-family:Poppins,Arial;
  background:linear-gradient(135deg,#e0f2fe,#f8fafc);
  color:#020617;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
}
.container{
  background:white;
  width:380px;
  padding:30px;
  border-radius:20px;
  box-shadow:0 20px 40px rgba(0,0,0,.15);
  position:relative;
}

/* Headings */
h1,h2{text-align:center;color:#2563eb;margin-bottom:10px}
hr{border:none;border-top:1px solid #e5e7eb;margin:20px 0}

/* Inputs & Buttons */
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #cbd5f5;
  font-size:15px;
}
input:focus{outline:none;border-color:#2563eb}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  color:white;
  font-weight:600;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}
button:hover{opacity:.9}

/* Error Messages */
.error{color:#dc2626;text-align:center;margin-top:5px}
small{color:#64748b}

/* Toast Notification */
.toast {
  position: fixed;
  top: 20px;
  right: 20px;
  background: #22c55e;
  color: white;
  padding: 14px 24px;
  border-radius: 12px;
  box-shadow:0 5px 15px rgba(0,0,0,.2);
  display: none;
  z-index: 1000;
  font-weight: 500;
}
.toast.error { background: #ef4444; }

/* Responsive */
@media(max-width:400px){
  .container{width:90%; padding:20px;}
}
</style>
</head>
<body>

<div class="container">

<h1>User Login</h1>
<form method="post">
  {% csrf_token %}
  <input type="text" name="username" placeholder="Username" required>
  <input type="password" name="password" placeholder="Password" required>
  <button type="submit">Login</button>
</form>

<hr>

<h2>Create Account</h2>
<form method="post" action="{% url 'register' %}">
  {% csrf_token %}
  <input type="text" name="username" placeholder="Username" required>
  <input type="email" name="email" placeholder="Email" required>
  <input type="password" name="password" placeholder="Password" required>
  <button type="submit">Register</button>
</form>

<p style="text-align:center;margin-top:15px;"><small>Smart Hotel Management System</small></p>

</div>

<!-- Toast Notification -->
<div id="toast" class="toast"></div>

<script>
// Show toast notifications
function showToast(message, isError=false){
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = 'toast';
  if(isError) toast.classList.add('error');
  toast.style.display = 'block';
  setTimeout(()=>{ toast.style.display='none'; }, 4000);
}

// Django messages
{% if messages %}
  {% for message in messages %}
    showToast("{{ message|escapejs }}", {% if 'error' in message.tags %}true{% else %}false{% endif %});
  {% endfor %}
{% endif %}

// Inline errors for login/register
{% if error %}
  showToast("{{ error|escapejs }}", true);
{% endif %}
{% if reg_error %}
  showToast("{{ reg_error|escapejs }}", true);
{% endif %}
</script>

</body>
</html>
