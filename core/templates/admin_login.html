<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<style>
body{
  background:#f8fafc;
  color:#0f172a;
  font-family:Poppins;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh
}
form{
  background:white;
  padding:40px;
  border-radius:20px;
  width:300px;
  text-align:center;
  box-shadow:0 20px 40px rgba(0,0,0,.15)
}
input,button{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #cbd5f5
}
input{background:#f1f5f9}
button{
  background:#2563eb;
  color:white;
  font-weight:600;
  cursor:pointer
}
button:hover{background:#1d4ed8}
h2{color:#2563eb}
</style>
</head>
<body>

<form method="post">
{% csrf_token %}
<h2>Admin Login</h2>
<input name="username" placeholder="Admin Username" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Login</button>
<p style="color:red">{{ error }}</p>
</form>

</body>
</html>
