{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<style>
body{font-family:Poppins;background:#020617;color:white;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
form{background:rgba(255,255,255,.1);padding:35px;border-radius:20px;width:320px;color:white}
input{width:100%;padding:12px;margin:10px 0;border-radius:8px;border:none}
button{width:100%;padding:12px;background:#f97316;border:none;border-radius:10px}
a{color:#38bdf8;text-decoration:none}
</style>
</head>
<body>
<form method="post">
{% csrf_token %}
<h2>Admin Login</h2>
<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Login</button>
<p><a href="{% url 'home' %}">Back to Home</a></p>
</form>
</body>
</html>
